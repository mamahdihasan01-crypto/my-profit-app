<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাপ ডাউনলোড করুন</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 300px;
            width: 90%;
        }
        .app-icon {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 15px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        h2 { margin: 10px 0; font-size: 24px; }
        p { font-size: 14px; opacity: 0.8; margin-bottom: 30px; }
        .download-btn {
            background: #00d2ff;
            background: linear-gradient(to right, #3a7bd5, #00d2ff);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            display: block;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,210,255,0.4);
        }
        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,210,255,0.6);
        }
        .version { font-size: 12px; margin-top: 15px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="card">
        <div class="app-icon">📱</div>
        <h2>আমার অ্যাপ</h2>
        <p>নিরাপদে এবং দ্রুত আপনার অ্যাপটি ডাউনলোড করতে নিচের বাটনে ক্লিক করুন।</p>
        
        <a href="MyWebApp.apk" class="download-btn">ডাউনলোড এপিকে (APK)</a>
        
        <div class="version">ভার্সন: ১.০.০ | সাইজ: ৪.১ MB</div>
    </div>

</body>
  </html>
